<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Legionella Test</title>

<style>
body { font-family: system-ui, Arial, sans-serif; margin: 20px;}
.card { max-width: 900px; margin: 0 auto; border: 1px solid #ddd; border-radius: 12px; padding: 16px; }
.row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
button { padding: 10px 14px; border-radius: 10px; border: 1px solid #bbb; background: #f7f7f7; cursor: pointer; }
button:hover{ background: #eee; }
button.primary { background: #1f6feb; border-color: #1f6feb; color: white;}
button.yes { background: #1a7f37; border-color: #1a7f37; color: white; }
button.no { background: #cf222e; border-color: #cf222e; color: white; }
button.next { background: #6e7781; border-color: #6e7781; color: white; }

img {
  max-width: 50%;
  display: block;
  margin: 0 auto;
  border-radius: 10px;
  border: 1px solid #ddd;
}

.muted { color: #666; }
.hidden { display: none; }
.big { font-size: 1.1rem; }
.spacer { height: 10px; }

@media print {
  .no-print { display: none !important; }
  body { margin: 0; }
  .card { border: none; }
}
</style>
</head>

<body>
<div class="card">

<h1>Legionella Beoordelingstest</h1>
<p class="muted">
Druk op Start. Per afbeelding kies je <b>Verdacht</b> of <b>Niet Verdacht</b>.
Aan het einde krijg je een score en die kun je printen.
</p>
  
<div id="setup" class="no-print">
  <button id="startBtn" class="primary">Start</button>
</div>

<div id="quiz" class="hidden">
  <div class="row no-print">
    <div><b>Vraag:</b> <span id="progressText"></span></div>
    <div>Score: <span id="liveScore">0</span></div>
  </div>

  <div class="spacer"></div>
  <img id="sampleImg" />
  <div class="spacer"></div>

  <div class="big"><b>Is dit Legionella?</b></div>

  <div class="row no-print">
    <button id="yesBtn" class="yes">Verdacht</button>
    <button id="noBtn" class="no">Niet Verdacht</button>
    <button id="nextBtn" class="next hidden">Next</button>
  </div>

  <div class="spacer"></div>
  <div id="feedback" class="muted"></div>
</div>

<div id="result" class="hidden">
  <h2>Resultaat</h2>
  <p>
    Score: <b><span id="finalCorrect"></span></b> /
    <b><span id="finalTotal"></span></b>
    (<b><span id="finalPercent"></span>%</b>)
  </p>

  <button onclick="window.print()">Print</button>
  <button onclick="start()">Opnieuw</button>
</div>

</div>

<script>
/* ===== CONFIG ===== */
const NUM_QUESTIONS = 25;

/* ===== VERDACHTE IMAGES ===== */
const LEG_IMAGES = [
  "leg1.jpg",
  "leg2.jpg",
  "leg3.jpg",
  "leg4.jpg",
  "leg5.jpg",
  "leg6.jpg",
  "leg7.jpg",
  "leg8.jpg",
  "leg9.jpg",
  "leg10.jpg",
  "leg11.jpg",
  "leg12.jpg",
  "leg13.jpg",
  "leg14.jpg",
  "leg15.jpg",
  "leg16.jpg",
  "leg17.jpg",
  "leg18.jpg",
  "leg19.jpg"
];

/* ===== NIET VERDACHTE IMAGES + POPUPTEKST ===== */
/*
  Vul bij popup je eigen tekst in.

  Voorbeeld:
  { file: "niet1.jpg", popup: "Deze lijkt verdacht, maar is geen Legionella." }

  Laat je popup leeg, dus popup: "",
  dan gebruikt hij automatisch:
  "Deze is wel verdacht"
*/
const NIETLEG_IMAGES = [
  { file: "niet1.jpg", popup: "" },
  { file: "niet2.jpg", popup: "" },
  { file: "niet3.jpg", popup: "" },
  { file: "niet4.jpg", popup: "" },
  { file: "niet5.jpg", popup: "" },
  { file: "niet6.jpg", popup: "" },
  { file: "niet7.jpg", popup: "" },
  { file: "niet8.jpg", popup: "" },
  { file: "niet9.jpg", popup: "" },
  { file: "niet10.jpg", popup: "" },
  { file: "niet11.jpg", popup: "" },
  { file: "niet12.jpg", popup: "" },
  { file: "niet13.jpg", popup: "" },
  { file: "niet14.jpg", popup: "" },
  { file: "niet15.jpg", popup: "" },
  { file: "niet16.jpg", popup: "" },
  { file: "niet17.jpg", popup: "" },
  { file: "niet18.jpg", popup: "" },
  { file: "niet19.jpg", popup: "" },
  { file: "niet20.jpg", popup: "" },
  { file: "niet21.jpg", popup: "" },
  { file: "niet22.jpg", popup: "" },
  { file: "niet23.jpg", popup: "" },
  { file: "niet24.jpg", popup: "" },
  { file: "niet25.jpg", popup: "" }
];

/* ===== STATE ===== */
let quizList = [];
let index = 0;
let correct = 0;
let currentAnswered = false;

/* ===== ELEMENTS ===== */
const quizEl = document.getElementById("quiz");
const resultEl = document.getElementById("result");
const progressTextEl = document.getElementById("progressText");
const liveScoreEl = document.getElementById("liveScore");
const imgEl = document.getElementById("sampleImg");
const feedbackEl = document.getElementById("feedback");
const nextBtn = document.getElementById("nextBtn");
const startBtn = document.getElementById("startBtn");

/* ===== HELPERS ===== */
const shuffle = arr => [...arr].sort(() => Math.random() - 0.5);

// Vult een lijst met herhaling tot gewenst aantal
function fillWithRepeat(pool, amount) {
  let out = [];
  while (out.length < amount) {
    out = out.concat(shuffle(pool));
  }
  return out.slice(0, amount);
}

// Voorkomt 2x dezelfde foto achter elkaar
function preventConsecutiveDuplicates(list) {
  for (let i = 1; i < list.length; i++) {
    if (list[i].file === list[i - 1].file) {
      for (let j = i + 1; j < list.length; j++) {
        if (list[j].file !== list[i].file) {
          [list[i], list[j]] = [list[j], list[i]];
          break;
        }
      }
    }
  }
  return list;
}

// Geeft eigen popuptekst terug.
// Als popup leeg is, komt standaardtekst.
function getPopupText(text) {
  if (text && text.trim() !== "") {
    return text;
  }
  return "Deze is niet verdacht";
}

/* ===== START ===== */
function start() {
  startBtn.textContent = "Opnieuw";
  startBtn.classList.add("hidden");

  const minLeg = Math.ceil(NUM_QUESTIONS * 0.3);
  const maxLeg = Math.floor(NUM_QUESTIONS * 0.7);

  const legCount =
    Math.floor(Math.random() * (maxLeg - minLeg + 1)) + minLeg;

  const nietCount = NUM_QUESTIONS - legCount;

  const legPool = LEG_IMAGES.map(f => ({
    file: "leg/" + f,
    isLegionella: true,
    popup: ""
  }));

  const nietPool = NIETLEG_IMAGES.map(img => ({
    file: "nietleg/" + img.file,
    isLegionella: false,
    popup: getPopupText(img.popup)
  }));

  const legSamples = fillWithRepeat(legPool, legCount);
  const nietSamples = fillWithRepeat(nietPool, nietCount);

  quizList = preventConsecutiveDuplicates(
    shuffle([...legSamples, ...nietSamples])
  );

  index = 0;
  correct = 0;

  quizEl.classList.remove("hidden");
  resultEl.classList.add("hidden");

  showQuestion();
}

/* ===== SHOW ===== */
function showQuestion() {
  const item = quizList[index];

  currentAnswered = false;
  nextBtn.classList.add("hidden");
  feedbackEl.textContent = "";

  progressTextEl.textContent = `${index + 1} / ${quizList.length}`;
  liveScoreEl.textContent = correct;
  imgEl.src = "./images/" + item.file;
}

/* ===== ANSWER ===== */
function answer(userAnswer) {
  if (currentAnswered) return;

  const item = quizList[index];

  /*
    Puntentelling:
    - Verdachte foto + gebruiker kiest Verdacht = goed
    - Verdachte foto + gebruiker kiest Niet Verdacht = fout
    - Niet verdachte foto + gebruiker kiest Niet Verdacht = goed
    - Niet verdachte foto + gebruiker kiest Verdacht = ook goed, maar met popup
  */
  const fout = item.isLegionella === true && userAnswer === false;

  if (!fout) {
    correct++;
  }

  if (fout) {
    feedbackEl.textContent = "❌ Fout (juist antwoord: Verdacht)";
  } else {
    feedbackEl.textContent = "✔️ Correct";

    // Alleen popup bij NIET verdachte afbeeldingen
    // En alleen als gebruiker toch "Verdacht" kiest
    if (item.isLegionella === false && userAnswer === true) {
      alert(item.popup);
    }
  }

  liveScoreEl.textContent = correct;
  currentAnswered = true;
  nextBtn.classList.remove("hidden");
}

/* ===== NEXT ===== */
function nextQuestion() {
  index++;

  if (index >= quizList.length) {
    finish();
  } else {
    showQuestion();
  }
}

/* ===== FINISH ===== */
function finish() {
  quizEl.classList.add("hidden");
  resultEl.classList.remove("hidden");

  startBtn.textContent = "Opnieuw";
  startBtn.classList.remove("hidden");

  document.getElementById("finalCorrect").textContent = correct;
  document.getElementById("finalTotal").textContent = quizList.length;
  document.getElementById("finalPercent").textContent =
    Math.round((correct / quizList.length) * 100);
}

/* ===== EVENTS ===== */
startBtn.onclick = start;
document.getElementById("yesBtn").onclick = () => answer(true);
document.getElementById("noBtn").onclick = () => answer(false);
nextBtn.onclick = nextQuestion;
</script>

</body>
</html>
