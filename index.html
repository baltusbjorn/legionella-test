<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Legionella Test</title>

<style>
body { font-family: system-ui, Arial, sans-serif; margin: 20px;}
.card { max-width: 900px; margin: 0 auto; border: 1px solid #ddd; border-radius: 12px; padding: 16px; }
.row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
button { padding: 10px 14px; border-radius: 10px; border: 1px solid #bbb; background: #f7f7f7; cursor: pointer; }
button:hover{ background: #eee; }
button.primary { background: #1f6feb; border-color: #1f6feb; color: white;}
button.yes { background: #1a7f37; border-color: #1a7f37; color: white; }
button.no { background: #cf222e; border-color: #cf222e; color: white; }
button.next { background: #6e7781; border-color: #6e7781; color: white; }

img {
  max-width: 50%;   /* 🔹 50% kleiner */
  display: block;
  margin: 0 auto;
  border-radius: 10px;
  border: 1px solid #ddd;
}

.muted { color: #666; }
.hidden { display: none; }
.big { font-size: 1.1rem; }
.spacer { height: 10px; }

@media print {
  .no-print { display: none !important; }
  body { margin: 0; }
  .card { border: none; }
}
</style>
</head>

<body>
<div class="card">

<h1>Legionella Beoordelingstest</h1>
<p class="muted">
Druk op Start. Per afbeelding kies je <b>Verdacht</b> (Legionella) of <b>Niet Verdacht</b>.
Aan het einde krijg je een score en die kun je printen.
</p>
  
<div id="setup" class="no-print">
  <button id="startBtn" class="primary">Start</button>
</div>

<div id="quiz" class="hidden">
  <div class="row no-print">
    <div><b>Vraag:</b> <span id="progressText"></span></div>
    <div>Score: <span id="liveScore">0</span></div>
  </div>

  <div class="spacer"></div>
  <img id="sampleImg" />
  <div class="spacer"></div>

  <div class="big"><b>Is dit Legionella?</b></div>

  <div class="row no-print">
    <button id="yesBtn" class="yes">Verdacht</button>
    <button id="noBtn" class="no">Niet Verdacht</button>
    <button id="nextBtn" class="next hidden">Next</button>
  </div>

  <div class="spacer"></div>
  <div id="feedback" class="muted"></div>
</div>

<div id="result" class="hidden">
  <h2>Resultaat</h2>
  <p>
    Score: <b><span id="finalCorrect"></span></b> /
    <b><span id="finalTotal"></span></b>
    (<b><span id="finalPercent"></span>%</b>)
  </p>

  <button onclick="window.print()">Print</button>
  <button onclick="start()">Opnieuw</button>
</div>

</div>

<script>
/* ===== CONFIG ===== */
const NUM_QUESTIONS = 25;

/* ===== IMAGES ===== */
const LEG_IMAGES = [
  "leg1.jpg","leg2.jpg","leg3.jpg","leg4.jpg","leg5.jpg","leg6.jpg","leg7.jpg","leg8.jpg","leg9.jpg","leg10.jpg","leg11.jpg","leg12.jpg","leg13.jpg","leg14.jpg","leg15.jpg","leg16.jpg","leg17.jpg","leg18.jpg","leg19.jpg",
];

const NIETLEG_IMAGES = [
  "niet1.jpg","niet2.jpg","niet3.jpg","niet4.jpg","niet5.jpg","niet6.jpg","niet7.jpg","niet8.jpg","niet9.jpg","niet10.jpg"
  ,"niet11.jpg","niet12.jpg","niet13.jpg","niet14.jpg","niet15.jpg","niet16.jpg","niet17.jpg","niet18.jpg","niet19.jpg","niet20.jpg"
  ,"niet21.jpg","niet22.jpg","niet23.jpg","niet24.jpg","niet25.jpg"
];

/* ===== STATE ===== */
let quizList = [];
let index = 0;
let correct = 0;
let currentAnswered = false;

/* ===== ELEMENTS ===== */
const quizEl = document.getElementById("quiz");
const resultEl = document.getElementById("result");
const progressTextEl = document.getElementById("progressText");
const liveScoreEl = document.getElementById("liveScore");
const imgEl = document.getElementById("sampleImg");
const feedbackEl = document.getElementById("feedback");
const nextBtn = document.getElementById("nextBtn");

/* ===== HELPERS ===== */
const shuffle = arr => [...arr].sort(() => Math.random() - 0.5);

  /* ===== EXTRA HELPERS ===== */

// vult een lijst met herhaling tot gewenst aantal
function fillWithRepeat(pool, amount) {
  let out = [];
  while (out.length < amount) {
    out = out.concat(shuffle(pool));
  }
  return out.slice(0, amount);
}

// voorkomt 2x dezelfde foto achter elkaar
function preventConsecutiveDuplicates(list) {
  for (let i = 1; i < list.length; i++) {
    if (list[i].file === list[i - 1].file) {
      for (let j = i + 1; j < list.length; j++) {
        if (list[j].file !== list[i].file) {
          [list[i], list[j]] = [list[j], list[i]];
          break;
        }
      }
    }
  }
  return list;
}

/* ===== START ===== */
function start() {
  const minLeg = Math.ceil(NUM_QUESTIONS * 0.3);
const maxLeg = Math.floor(NUM_QUESTIONS * 0.7);

const legCount =
  Math.floor(Math.random() * (maxLeg - minLeg + 1)) + minLeg;
  const nietCount = NUM_QUESTIONS - legCount;

  const legPool = LEG_IMAGES.map(f => ({
    file: "leg/" + f,
    isLegionella: true
  }));

  const nietPool = NIETLEG_IMAGES.map(f => ({
    file: "nietleg/" + f,
    isLegionella: false
  }));

  const legSamples = fillWithRepeat(legPool, legCount);
  const nietSamples = fillWithRepeat(nietPool, nietCount);

  quizList = preventConsecutiveDuplicates(
    shuffle([...legSamples, ...nietSamples])
  );

  index = 0;
  correct = 0;

  quizEl.classList.remove("hidden");
  resultEl.classList.add("hidden");

  showQuestion();
}
/* ===== SHOW ===== */
function showQuestion() {
  const item = quizList[index];
  currentAnswered = false;
  nextBtn.classList.add("hidden");
  feedbackEl.textContent = "";

  progressTextEl.textContent = `${index + 1} / ${quizList.length}`;
  liveScoreEl.textContent = correct;
  imgEl.src = "./images/" + item.file;
}

/* ===== ANSWER ===== */
function answer(userAnswer) {
  if (currentAnswered) return;

  const item = quizList[index];
  const ok = userAnswer === item.isLegionella;

  if (ok) correct++;

  feedbackEl.textContent = ok
    ? "✔️ Correct"
    : `❌ Fout (juist antwoord: ${item.isLegionella ? "Verdacht" : "Niet Verdacht"})`;

  liveScoreEl.textContent = correct;
  currentAnswered = true;
  nextBtn.classList.remove("hidden");
}

/* ===== NEXT ===== */
function nextQuestion() {
  index++;
  if (index >= quizList.length) finish();
  else showQuestion();
}

/* ===== FINISH ===== */
function finish() {
  quizEl.classList.add("hidden");
  resultEl.classList.remove("hidden");

  document.getElementById("finalCorrect").textContent = correct;
  document.getElementById("finalTotal").textContent = quizList.length;
  document.getElementById("finalPercent").textContent =
    Math.round((correct / quizList.length) * 100);
}

/* ===== EVENTS ===== */
document.getElementById("startBtn").onclick = start;
document.getElementById("yesBtn").onclick = () => answer(true);
document.getElementById("noBtn").onclick = () => answer(false);
nextBtn.onclick = nextQuestion;
</script>

</body>
</html>
